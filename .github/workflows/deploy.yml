name: CI-CD Cloud EFT

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Compilar y desplegar en EC2
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: |
            guia-productor/pom.xml
            guia-consumidor/pom.xml

      - name: Compilar productor
        working-directory: guia-productor
        run: |
          chmod +x mvnw
          ./mvnw -B clean package -DskipTests

      - name: Compilar consumidor
        working-directory: guia-consumidor
        run: |
          chmod +x mvnw
          ./mvnw -B clean package -DskipTests

      - name: Preparar conexión SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Crear archivo de variables
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          AZURE_B2C_ISSUER_URI: ${{ secrets.AZURE_B2C_ISSUER_URI }}
          AZURE_B2C_JWK_SET_URI: ${{ secrets.AZURE_B2C_JWK_SET_URI }}
          AZURE_B2C_AUDIENCE: ${{ secrets.AZURE_B2C_AUDIENCE }}
        run: |
          cat > /tmp/cloud.env <<EOF
          SPRING_PROFILES_ACTIVE=cloud

          PRODUCTOR_PORT=8080
          CONSUMIDOR_PORT=8081

          RABBITMQ_HOST=rabbitmq
          RABBITMQ_PORT=5672
          RABBITMQ_USERNAME=guias
          RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}

          H2_URL=jdbc:h2:file:/app/data/guiasdb;AUTO_SERVER=TRUE
          H2_USERNAME=sa
          H2_PASSWORD=

          AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
          AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
          AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
          AWS_REGION=us-east-1
          AWS_S3_BUCKET=inscripcionesclouds4

          AZURE_B2C_ISSUER_URI=${AZURE_B2C_ISSUER_URI}
          AZURE_B2C_JWK_SET_URI=${AZURE_B2C_JWK_SET_URI}
          AZURE_B2C_AUDIENCE=${AZURE_B2C_AUDIENCE}
          AZURE_ROLE_CLAIM=extension_guiaRole
          EOF

          chmod 600 /tmp/cloud.env

      - name: Empaquetar proyecto
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='env.example' \
            --exclude='data-consumidor' \
            --exclude='.DS_Store' \
            -czf /tmp/cloud_eft.tar.gz .

      - name: Copiar archivos a EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh -i ~/.ssh/ec2_key ec2-user@"$EC2_HOST" \
            "mkdir -p ~/cloudnative/cloud_eft"

          scp -i ~/.ssh/ec2_key \
            /tmp/cloud_eft.tar.gz \
            ec2-user@"$EC2_HOST":/tmp/cloud_eft.tar.gz

          scp -i ~/.ssh/ec2_key \
            /tmp/cloud.env \
            ec2-user@"$EC2_HOST":/tmp/cloud.env

      - name: Desplegar con Docker Compose
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh -i ~/.ssh/ec2_key ec2-user@"$EC2_HOST" <<'REMOTE'
            set -e

            PROJECT_DIR="$HOME/cloudnative/cloud_eft"

            mkdir -p "$PROJECT_DIR/data-consumidor"

            cd "$PROJECT_DIR"

            docker-compose down || true

            rm -rf guia-productor guia-consumidor
            rm -f docker-compose.yml README.md README_SEGURIDAD_JWT.md

            tar -xzf /tmp/cloud_eft.tar.gz -C "$PROJECT_DIR"
            mv /tmp/cloud.env "$PROJECT_DIR/.env"
            chmod 600 "$PROJECT_DIR/.env"

            docker-compose up --build -d

            echo "Esperando el inicio de los servicios..."
            sleep 40

            docker-compose ps
          REMOTE

      - name: Verificar salud
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh -i ~/.ssh/ec2_key ec2-user@"$EC2_HOST" <<'REMOTE'
            set -e

            echo "Productor:"
            curl --fail --silent --show-error \
              http://localhost:8080/actuator/health

            echo
            echo "Consumidor:"
            curl --fail --silent --show-error \
              http://localhost:8081/actuator/health

            echo
            echo "Contenedores:"
            cd ~/cloudnative/cloud_eft
            docker-compose ps

            echo
            echo "Despliegue completado correctamente."
          REMOTE
