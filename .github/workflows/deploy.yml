name: CI-CD Cloud EFT

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Compilar y desplegar en EC2
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: |
            guia-productor/pom.xml
            guia-consumidor/pom.xml

      - name: Compilar productor
        working-directory: guia-productor
        run: |
          chmod +x mvnw
          ./mvnw -B clean package -DskipTests

      - name: Compilar consumidor
        working-directory: guia-consumidor
        run: |
          chmod +x mvnw
          ./mvnw -B clean package -DskipTests

      - name: Preparar conexión SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY_B64: ${{ secrets.EC2_SSH_KEY_B64 }}
        run: |
          set -euo pipefail

          test -n "$EC2_HOST" || { echo "ERROR: EC2_HOST está vacío."; exit 1; }
          test -n "$EC2_SSH_KEY_B64" || { echo "ERROR: EC2_SSH_KEY_B64 está vacío."; exit 1; }

          mkdir -p "$HOME/.ssh"

          printf '%s' "$EC2_SSH_KEY_B64" | base64 --decode > "$HOME/.ssh/ec2_key"
          chmod 600 "$HOME/.ssh/ec2_key"

          ssh-keygen -y -f "$HOME/.ssh/ec2_key" > /dev/null

          cat > "$HOME/.ssh/config" <<SSHCONFIG
          Host ec2-target
            HostName ${EC2_HOST}
            User ec2-user
            IdentityFile ${HOME}/.ssh/ec2_key
            IdentitiesOnly yes
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ConnectTimeout 20
            ServerAliveInterval 15
            ServerAliveCountMax 4
          SSHCONFIG

          chmod 600 "$HOME/.ssh/config"
          ssh ec2-target "echo 'Conexión SSH validada correctamente.'"

      - name: Crear archivo de variables
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          AZURE_B2C_ISSUER_URI: ${{ secrets.AZURE_B2C_ISSUER_URI }}
          AZURE_B2C_JWK_SET_URI: ${{ secrets.AZURE_B2C_JWK_SET_URI }}
          AZURE_B2C_AUDIENCE: ${{ secrets.AZURE_B2C_AUDIENCE }}
        run: |
          set -euo pipefail

          cat > /tmp/cloud.env <<ENVEOF
          SPRING_PROFILES_ACTIVE=cloud

          PRODUCTOR_PORT=8080
          CONSUMIDOR_PORT=8081

          RABBITMQ_HOST=rabbitmq
          RABBITMQ_PORT=5672
          RABBITMQ_USERNAME=guias
          RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}

          H2_URL=jdbc:h2:file:/app/data/guiasdb;AUTO_SERVER=TRUE
          H2_USERNAME=sa
          H2_PASSWORD=

          AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
          AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
          AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
          AWS_REGION=us-east-1
          AWS_S3_BUCKET=inscripcionesclouds4

          AZURE_B2C_ISSUER_URI=${AZURE_B2C_ISSUER_URI}
          AZURE_B2C_JWK_SET_URI=${AZURE_B2C_JWK_SET_URI}
          AZURE_B2C_AUDIENCE=${AZURE_B2C_AUDIENCE}
          AZURE_ROLE_CLAIM=extension_guiaRole
          ENVEOF

          chmod 600 /tmp/cloud.env

      - name: Empaquetar proyecto
        run: |
          set -euo pipefail
          tar             --exclude='.git'             --exclude='.github'             --exclude='.env'             --exclude='env.example'             --exclude='data-consumidor'             --exclude='.DS_Store'             -czf /tmp/cloud_eft.tar.gz .

      - name: Copiar archivos a EC2
        run: |
          set -euo pipefail
          ssh ec2-target "mkdir -p ~/cloudnative/cloud_eft"
          scp /tmp/cloud_eft.tar.gz ec2-target:/tmp/cloud_eft.tar.gz
          scp /tmp/cloud.env ec2-target:/tmp/cloud.env

      - name: Desplegar con Docker Compose
        run: |
          set -euo pipefail
          ssh ec2-target <<'REMOTE'
            set -euo pipefail

            PROJECT_DIR="$HOME/cloudnative/cloud_eft"

            mkdir -p "$PROJECT_DIR"
            mkdir -p "$PROJECT_DIR/data-consumidor"

            cd "$PROJECT_DIR"

            docker-compose down --remove-orphans || true
            docker rm -f guia-productor guia-consumidor rabbitmq-guias 2>/dev/null || true

            rm -rf guia-productor guia-consumidor
            rm -f docker-compose.yml README.md README_SEGURIDAD_JWT.md

            tar -xzf /tmp/cloud_eft.tar.gz -C "$PROJECT_DIR"

            mv /tmp/cloud.env "$PROJECT_DIR/.env"
            chmod 600 "$PROJECT_DIR/.env"

            docker-compose up --build -d

            echo "Esperando el inicio de los servicios..."
            sleep 45

            echo "Despliegue Docker ejecutado."
          REMOTE

      - name: Verificar salud
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          set -euo pipefail

          echo "Verificando productor..."
          curl --retry 12                --retry-delay 5                --retry-connrefused                --fail                --silent                --show-error                "http://${EC2_HOST}:8080/actuator/health"

          echo
          echo "Verificando consumidor..."
          curl --retry 12                --retry-delay 5                --retry-connrefused                --fail                --silent                --show-error                "http://${EC2_HOST}:8081/actuator/health"

          echo
          echo "Ambos microservicios respondieron UP."

      - name: Mostrar estado de contenedores
        continue-on-error: true
        run: |
          ssh ec2-target "cd ~/cloudnative/cloud_eft && docker-compose ps" ||             echo "Advertencia: no fue posible mostrar docker-compose ps, pero los health checks fueron exitosos."

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Actualizar integraciones de API Gateway
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          set -euo pipefail

          API_ID="3nbunesv5k"

          aws sts get-caller-identity

          aws apigatewayv2 get-integrations             --api-id "$API_ID"             --query "Items[?starts_with(IntegrationUri, 'http://')].[IntegrationId,IntegrationUri]"             --output text |
          while IFS=$'\t' read -r INTEGRATION_ID OLD_URI; do
            test -n "$INTEGRATION_ID" || continue

            NEW_URI=$(printf '%s' "$OLD_URI" | sed -E "s#^http://[^/:]+#http://${EC2_HOST}#")

            echo "${INTEGRATION_ID}: ${OLD_URI} -> ${NEW_URI}"

            aws apigatewayv2 update-integration               --api-id "$API_ID"               --integration-id "$INTEGRATION_ID"               --integration-uri "$NEW_URI"               > /dev/null
          done

          echo "Integraciones finales:"

          aws apigatewayv2 get-integrations             --api-id "$API_ID"             --query "Items[*].[IntegrationId,IntegrationMethod,IntegrationUri]"             --output table

          AUTO_DEPLOY=$(aws apigatewayv2 get-stage             --api-id "$API_ID"             --stage-name '$default'             --query "AutoDeploy"             --output text)

          if [ "$AUTO_DEPLOY" != "True" ] && [ "$AUTO_DEPLOY" != "true" ]; then
            aws apigatewayv2 create-deployment               --api-id "$API_ID"               --stage-name '$default'
          fi

          echo "API Gateway actualizado correctamente."
